  base: "🪐 <b>Йоу, чат.</b> Твой юзербот <b>{}</b> теперь имба и готов раздавать стиль.\n\n💫 <b>Нужен хелп, бро?</b> Залетай в <a href=\"https://t.me/heroku_talks\">наш саппорт чат</a>. Мы хелпаем <b>вообще всем</b>, ноу кэп.\n\n️ <b>Быстрый гайд, бести:</b>\n\n⃣ <b>Дропай</b> <code>.help</code><b>, чтобы чекнуть список модулей</b>\n⃣ <b>Дропай</b> <code>.help &lt;Имя модуля/команда&gt;</code><b>, чтобы выкупить лор модуля</b>\n⃣ <b>Дропай</b> <code>.dlmod &lt;ссылка&gt;</code><b>, чтобы залутать модуль по ссылке</b>\n⃣ <b>Дропай</b> <code>.loadmod</code> <b>реплаем на файл, чтобы вытянуть из него модуль</b>\n⃣ <b>Дропай</b> <code>.unloadmod &lt;Имя модуля&gt;</code><b>, чтобы снести модуль</b>\n\n💡 <b>Heroku проходит вайб-чек и поддерживает модули от Hikka, Friendly-Telegram и GeekTG, ну и свои собственные, рил.</b>\n"

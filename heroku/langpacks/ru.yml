  desc: "🪐 <b>Что такое Userbot?</b>\n\n😎 Userbot - это <b>сторонняя программа</b>, которая взаимодействует с Telegram API для выполнения <b>автоматизированных задач от имени пользователя</b>. Юзерботы могут использоваться для автоматизации различных задач, таких как <b>отправка сообщений, присоединение к каналам, загрузка медиафайлов и многое другое</b>.\n\n😎 Юзерботы отличаются от обычных ботов в Telegram тем, что <b>они работают на аккаунте пользователя</b>, а не на бот-аккаунте. Это означает, что они могут иметь доступ к большему количеству функций и обладают большей гибкостью в плане выполнения действий.\n\n🚫 Однако важно отметить, что <b>юзерботы официально не поддерживаются Telegram</b> и их использование может нарушать условия использования платформы. Поэтому <b>пользователи должны быть осторожны при их использовании</b> и убедиться, что на их аккаунте не выполняется вредоносный код.\n\n"
  no_font: "❌ Где ссылка или реплай на шрифт?"
  no_banner: "😶 <b>По указанной ссылке </b><code>{link}</code><b> ничего не найдено.\n\nПроверьте целостность вашего файла по ссылке, а так же удостоверьтесь, что ссылка указывает прямо на файл.</b>"

  name: Presets
settings:
  choose_installation: "🪐 <b>Выберите вариант установки Heroku:</b>"
  vds_install: "💎 Процесс установки на VDS выполняется одной командой:\n<pre><code class=\"language-shell\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install git python3-pip &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n<i>Примечание: Если у вас отсутствуют права sudo, исключите соответствующую часть команды.</i>"
  wsl_install: "<b>Скачай WSL.</b> Для этого открой PowerShell с правами администратора и напиши <code>wsl --install -d Ubuntu-22.04</code> \n⚠️ <i>Для установки WSL необходима Windows 10 build 2004 или Windows 11 любой версии и ПК с поддержкой виртуализации. Для установки на более ранние версии ОС обратись к</i> <a href=\"https://learn.microsoft.com/ru-ru/windows/wsl/install-manual\">этой странице</a>\n\n⬜️ <b>Перезагрузи ПК и запусти приложение Ubuntu 22.04.x</b> \n\n⬜️ <b>Вставь в него команду (ПКМ):</b> <code>curl -Ss https://bootstrap.pypa.io/get-pip.py | python3</code> \n⚠️ <i>При появлении желтых предупреждений введи</i> <code>export PATH=\"/home/username/.local/bin:$PATH\"</code> <i>заменив /home/username/.local/bin на тот путь, о котором говорится в сообщении</i>\n\n⬜️ <b>Вставь команду (ПКМ):</b> \n<pre><code class=\"language-bash\">clear &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n🔗 <b>Где получить API_ID и API_HASH?</b>: <a href=\"https://youtu.be/DcqDA249Lhg?t=24\">Видео</a>"
  userland_install: "<b>Установи UserLAnd по</b> <a href=\"https://play.google.com/store/apps/details?id=tech.ula\">ссылке</a>\n\n<b>Открой его, выбери Ubuntu —&gt; Minimal —&gt; Terminal</b>\n\n<b>Жди установки дистрибутива, можешь налить чаю</b>\n\n<b>После успешной установки перед тобой откроется терминал, пиши туда:</b>\n<pre><code class=\"language-bash\">sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install python3 git python3-pip -y &amp;&amp; git clone https://github.com/coddrago/Heroku &amp;&amp; cd Heroku &amp;&amp; sudo pip install -r requirements.txt &amp;&amp; python3 -m heroku</code></pre>\n\n<b>В конце установки появится ссылка, переходи по ней и вводи данные своего аккаунта для входа.\n\nВуаля! Вы установили Heroku на UserLAnd.</b>"
  hikkahost_install: "<b>🌘 Как установить Heroku на HikkaHost?</b>\n\n1. Перейдите в @hikkahost_bot\n2. Выберите «Установить»\n3. Выберите «🪐 Heroku»\n\nИ продолжайте установку.\n\n<b>После этого вы получите ссылку, откройте ее и войдите в свой аккаунт.</b>"
  lavhost_install: "⬇️ Чтобы установить, просто перейдите в @lavhostbot и выполните следующие шаги:\n\n• Введите команду /buy, выберите и оплатите счет\n• При необходимости отправьте квитанцию об оплате\n• После подтверждения оплаты введите /install и выберите Heroku\n• Следуйте инструкциям бота"
  too_many_args: "🚫 <b>Слишком много аргументов</b>"
  blacklisted: "👍 <b>Чат {} добавлен в черный список юзербота</b>"
  unblacklisted: "👍 <b>Чат {} удален из черного списка юзербота</b>"
